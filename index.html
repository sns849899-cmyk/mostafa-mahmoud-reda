<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>موقع مصطفى محمود</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background-image:url("https://images.unsplash.com/photo-1564769625905-50e93615e769?auto=format&fit=crop&w=2000&q=100");
    background-size:cover;
    background-position:center;
    background-attachment:fixed;
    background-repeat:no-repeat;
    color:white;
    text-align:center;
    line-height:1.9;
}

header{
    padding:20px;
    background:#111827;
}

h1{
    color:#ffd700;
    margin:0;
}

.box{
    max-width:900px;
    margin:auto;
    background:rgba(0,0,0,.45);
    padding:20px;
    border-radius:15px;
    backdrop-filter:blur(3px);
}

section{
    margin-bottom:35px;
    padding-bottom:20px;
    border-bottom:1px solid #334155;
}

h2{
    color:#fbbf24;
}

input, select{
    width:90%;
    padding:10px;
    border-radius:10px;
    border:none;
    margin-top:10px;
}

button{
    padding:10px 20px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:#fbbf24;
    cursor:pointer;
}

audio{
    width:100%;
    margin-top:10px;
}

img{
    max-width:100%;
    border-radius:10px;
    margin:10px 0;
}
</style>
</head>

<body>

<header>
    <h1>موقع مصطفى محمود</h1>
</header>

<main>
<div class="box">

<section>
    <h2>🔍 بحث عن صور</h2>
    <input type="text" id="searchBox" placeholder="اكتب: مسجد - قرآن - مكة">
    <button onclick="searchImages()">بحث</button>
    <div id="results"></div>
</section>

<section>
    <h2>📖 القرآن الكريم كامل (114 سورة)</h2>

    <select id="surahSelect" onchange="changeSurah()"></select>
    <audio id="audioPlayer" controls></audio>
</section>

<section>
    <h2>🖼️ صور إسلامية</h2>

    <img loading="lazy" src="https://source.unsplash.com/600x900/?mosque">
    <img loading="lazy" src="https://source.unsplash.com/600x900/?quran">
    <img loading="lazy" src="https://source.unsplash.com/600x900/?islamic">
    <img loading="lazy" src="https://source.unsplash.com/600x900/?islam,night">
</section>

</div>
</main>

<footer style="padding:15px;background:#111827;color:#cbd5e1;">
© موقع مصطفى محمود
</footer>

<script>
function searchImages(){
    let query = document.getElementById("searchBox").value;
    let results = document.getElementById("results");

    if(query.trim()===""){
        results.innerHTML = "<p>اكتب كلمة للبحث</p>";
        return;
    }

    results.innerHTML = `
        <p>نتائج البحث عن: <b>${query}</b></p>
        <img src="https://source.unsplash.com/600x400/?${query}">
        <img src="https://source.unsplash.com/600x400/?mosque,${query}">
        <img src="https://source.unsplash.com/600x400/?islam,${query}">
    `;
}

const baseURL = "https://download.quranicaudio.com/quran/mishaari_raashid_al_3afaasee/";

const surahs = ["الفاتحة","البقرة","آل عمران","النساء","المائدة","الأنعام","الأعراف","الأنفال","التوبة","يونس","هود","يوسف","الرعد","إبراهيم","الحجر","النحل","الإسراء","الكهف","مريم","طه","الأنبياء","الحج","المؤمنون","النور","الفرقان","الشعراء","النمل","القصص","العنكبوت","الروم","لقمان","السجدة","الأحزاب","سبأ","فاطر","يس","الصافات","ص","الزمر","غافر","فصلت","الشورى","الزخرف","الدخان","الجاثية","الأحقاف","محمد","الفتح","الحجرات","ق","الذاريات","الطور","النجم","القمر","الرحمن","الواقعة","الحديد","المجادلة","الحشر","الممتحنة","الصف","الجمعة","المنافقون","التغابن","الطلاق","التحريم","الملك","القلم","الحاقة","المعارج","نوح","الجن","المزمل","المدثر","القيامة","الإنسان","المرسلات","النبأ","النازعات","عبس","التكوير","الانفطار","المطففين","الانشقاق","البروج","الطارق","الأعلى","الغاشية","الفجر","البلد","الشمس","الليل","الضحى","الشرح","التين","العلق","القدر","البينة","الزلزلة","العاديات","القارعة","التكاثر","العصر","الهمزة","الفيل","قريش","الماعون","الكوثر","الكافرون","النصر","المسد","الإخلاص","الفلق","الناس"];

const select = document.getElementById("surahSelect");
const audio = document.getElementById("audioPlayer");

surahs.forEach((s,i)=>{
    let opt=document.createElement("option");
    opt.value=i+1;
    opt.textContent=(i+1)+" - "+s;
    select.appendChild(opt);
});

function changeSurah(){
    let num = select.value;
    let file = num.toString().padStart(3,'0') + ".mp3";
    audio.src = baseURL + file;
}

changeSurah();
</script>

</body>
</html>
