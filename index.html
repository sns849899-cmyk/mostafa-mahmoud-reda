<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title> موقع مصطفي محمود رضا علي مرسي واليtitle>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    color:white;
    line-height:1.9;
    text-align:center;

    /* 🕌 خلفية شيخ */
    background: url("https://images.unsplash.com/photo-1609599006353-e629aaabfeae") no-repeat center center fixed;
    background-size: cover;
    position: relative;
}

/* 🔳 تغميق + وضوح */
body::before{
    content:"";
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(2px);
    z-index:-1;
}

header{
    padding:20px;
    background:#111827;
}

h1{
    color:#ffd700;
    margin:0;
    font-size:22px;
}

main{
    padding:20px;
}

.box{
    max-width:900px;
    margin:auto;
    background:#1e293b;
    padding:20px;
    border-radius:15px;
}

section{
    margin-bottom:35px;
    padding-bottom:20px;
    border-bottom:1px solid #334155;
}

h2{
    color:#fbbf24;
}

audio{
    width:100%;
    margin:10px 0;
}

input{
    width:80%;
    padding:10px;
    border-radius:10px;
    border:none;
}

button{
    padding:10px 20px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:#fbbf24;
    cursor:pointer;
}

button:hover{
    background:#eab308;
}

img{
    max-width:100%;
    border-radius:10px;
    margin:10px 0;
}

.verse{
    margin-top:10px;
    color:#e2e8f0;
}

footer{
    padding:15px;
    background:#111827;
    font-size:14px;
    color:#cbd5e1;
}
</style>
</head>

<body>

<header>
    <h1>موقع إسلامي</h1>
</header>

<main>
<div class="box">

    <!-- 🔍 بحث صور -->
    <section>
        <h2>🔍 بحث عن صور</h2>

        <input type="text" id="searchBox" placeholder="اكتب: مسجد - قرآن - مكة...">

        <br>
        <button onclick="searchImages()">بحث</button>

        <div id="results"></div>
    </section>

    <!-- السور -->
    <section><h2>سورة الفاتحة</h2>
        <audio controls><source src="https://download.quranicaudio.com/quran/mishaari_raashid_al_3afaasee/001.mp3"></audio>
    </section>

    <section><h2>سورة الإخلاص</h2>
        <audio controls><source src="https://download.quranicaudio.com/quran/mishaari_raashid_al_3afaasee/112.mp3"></audio>
    </section>

    <section><h2>سورة الفلق</h2>
        <audio controls><source src="https://download.quranicaudio.com/quran/mishaari_raashid_al_3afaasee/113.mp3"></audio>
    </section>

    <section><h2>سورة الناس</h2>
        <audio controls><source src="https://download.quranicaudio.com/quran/mishaari_raashid_al_3afaasee/114.mp3"></audio>
    </section>

    <section><h2>سورة البقرة</h2>
        <audio controls><source src="https://download.quranicaudio.com/quran/mishaari_raashid_al_3afaasee/002.mp3"></audio>
    </section>

    <!-- أدعية -->
    <section>
        <h2>أدعية السفر</h2>
        <p class="verse">اللهم إنا نسألك في سفرنا هذا البر والتقوى...</p>
    </section>

    <section>
        <h2>أدعية قبل النوم</h2>
        <p class="verse">باسمك اللهم أموت وأحيا</p>
    </section>

    <section>
        <h2>أدعية بعد الاستيقاظ</h2>
        <p class="verse">الحمد لله الذي أحيانا بعد ما أماتنا</p>
    </section>

    <section>
        <h2>أدعية قبل وبعد الأكل</h2>
        <p class="verse">
            قبل الأكل: بسم الله<br>
            بعد الأكل: الحمد لله الذي أطعمنا وسقانا
        </p>
    </section>

</div>
</main>

<footer>
    © موقع إسلامي
</footer>

<script>
function searchImages(){
    let query = document.getElementById("searchBox").value;
    let results = document.getElementById("results");

    if(query.trim() === ""){
        results.innerHTML = "<p>اكتب كلمة للبحث</p>";
        return;
    }

    let safeQuery = query.replace(/</g, "&lt;").replace(/>/g, "&gt;");

    results.innerHTML = `
        <p>نتائج البحث عن: <b>${safeQuery}</b></p>

        <img src="https://source.unsplash.com/600x400/?${encodeURIComponent(query)},mosque">
        <img src="https://source.unsplash.com/600x400/?${encodeURIComponent(query)}">
        <img src="https://source.unsplash.com/600x400/?islam,${encodeURIComponent(query)}">
    `;
}
</script>

</body>
</html>
