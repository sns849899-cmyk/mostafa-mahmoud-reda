<h1>صاحب الموقع مصطفى محمود رضا علي مرسي والي</h1>

<h2>آيات قرآنية</h2>

<p>﴿ وَقُل رَّبِّ زِدْنِي عِلْمًا ﴾</p>

<p>﴿ إِنَّ مَعَ الْعُسْرِ يُسْرًا ﴾</p>

<p>﴿ وَمَا تَوْفِيقِي إِلَّا بِاللَّهِ ﴾</p>
