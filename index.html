<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>موقع مصطفى محمود</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#0f172a;
    color:white;
    line-height:1.9;
    text-align:center;
}

header{
    padding:20px;
    background:#111827;
}

h1{
    color:#ffd700;
    margin:0;
    font-size:22px;
}

main{
    padding:20px;
}

.box{
    max-width:900px;
    margin:auto;
    background:#1e293b;
    padding:20px;
    border-radius:15px;
}

section{
    margin-bottom:35px;
    padding-bottom:20px;
    border-bottom:1px solid #334155;
}

h2{
    color:#fbbf24;
}

img{
    max-width:100%;
    border-radius:10px;
    margin:10px 0;
}

audio{
    width:100%;
    margin:10px 0;
}

input{
    width:80%;
    padding:10px;
    border-radius:10px;
    border:none;
}

button{
    padding:10px 20px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:#fbbf24;
    cursor:pointer;
}

footer{
    padding:15px;
    background:#111827;
    font-size:14px;
    color:#cbd5e1;
}
</style>
</head>

<body>

<header>
    <h1>موقع مصطفى محمود</h1>
</header>

<main>
<div class="box">

    <!-- البحث -->
    <section>
        <h2>🔍 بحث عن صور</h2>
        <input type="text" id="searchBox" placeholder="اكتب: مسجد - قرآن - مكة - اسلام">
        <br>
        <button onclick="searchImages()">بحث</button>
        <div id="results"></div>
    </section>

    <!-- الفاتحة -->
    <section>
        <h2>سورة الفاتحة</h2>
        <audio controls>
            <source src="https://download.quranicaudio.com/quran/mishaari_raashid_al_3afaasee/001.mp3">
        </audio>
    </section>

    <!-- الإخلاص -->
    <section>
        <h2>سورة الإخلاص</h2>
        <audio controls>
            <source src="https://download.quranicaudio.com/quran/mishaari_raashid_al_3afaasee/112.mp3">
        </audio>
    </section>

    <!-- الفلق -->
    <section>
        <h2>سورة الفلق</h2>
        <audio controls>
            <source src="https://download.quranicaudio.com/quran/mishaari_raashid_al_3afaasee/113.mp3">
        </audio>
    </section>

    <!-- الناس -->
    <section>
        <h2>سورة الناس</h2>
        <audio controls>
            <source src="https://download.quranicaudio.com/quran/mishaari_raashid_al_3afaasee/114.mp3">
        </audio>
    </section>

    <!-- سورة البقرة -->
    <section>
        <h2>سورة البقرة (كاملة بصوت القارئ)</h2>
        <audio controls>
            <source src="https://download.quranicaudio.com/quran/mishaari_raashid_al_3afaasee/002.mp3">
        </audio>
    </section>

    <!-- صور طويلة -->
    <section>
        <h2>🖼️ صور طويلة</h2>

        <img loading="lazy" src="https://source.unsplash.com/600x900/?mosque">
        <img loading="lazy" src="https://source.unsplash.com/600x900/?quran">
        <img loading="lazy" src="https://source.unsplash.com/600x900/?islamic">
        <img loading="lazy" src="https://source.unsplash.com/600x900/?islam,night">
    </section>

</div>
</main>

<footer>
    © موقع مصطفى محمود
</footer>

<script>
function searchImages(){
    let query = document.getElementById("searchBox").value;
    let results = document.getElementById("results");

    if(query.trim() === ""){
        results.innerHTML = "<p>اكتب كلمة للبحث</p>";
        return;
    }

    results.innerHTML = `
        <p>نتائج البحث عن: <b>${query}</b></p>
        <img src="https://source.unsplash.com/600x400/?${query}">
        <img src="https://source.unsplash.com/600x400/?mosque,${query}">
        <img src="https://source.unsplash.com/600x400/?islam,${query}">
    `;
}
</script>

</body>
</html>
